interface:
  display_name: "Apex Init Project Agent"
  short_description: "固定生成 AGENTS.md/CLAUDE.md，按源码生成 rules"
  default_prompt: "使用 apex-init-project-agent 初始化项目根 AGENTS.md、CLAUDE.md，并根据项目源码与配置生成 .claude/rules；AGENTS.md 主体必须等于 CLAUDE.md 去掉 .claude/rules 按需加载入口后的内容，再追加 Codex 硬规则；固定模板必须保留中文 key 的任务契约工作流（任务ID、目标、范围、允许路径、禁止路径、验收、必跑检查、交付证据、需要审查），并明确 Subagent 派发禁止 fork_turns: all、必须手写最小子任务包和必须阅读的 md 文档清单、子智能体是叶子执行者；从 api-design、backend、frontend rules 各提炼最多 10 行硬规则回填到 AGENTS.md；默认只补缺，用户明确要求重新生成时重写 AGENTS.md、CLAUDE.md 和全部 rules。"
