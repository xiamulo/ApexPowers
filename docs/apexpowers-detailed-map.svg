<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2600" viewBox="0 0 2000 2600" role="img" aria-labelledby="title desc">
  <title id="title">ApexPowers 详细项目地图</title>
  <desc id="desc">按流程、skills、Markdown 文档、脚本、hook runtime、测试和产物说明 ApexPowers 每个主要组成部分的用途。</desc>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d0d8e4; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .flow { fill: #eff6ff; stroke: #60a5fa; }
      .apex { fill: #fff7ed; stroke: #fb923c; }
      .docs { fill: #ecfdf5; stroke: #34d399; }
      .vendored { fill: #f5f3ff; stroke: #8b5cf6; }
      .runtime { fill: #fdf2f8; stroke: #f472b6; }
      .test { fill: #fef2f2; stroke: #f87171; }
      .title { font: 800 46px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .section { font: 800 25px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .h3 { font: 800 19px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .body { font: 400 16px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .small { font: 400 14px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .mono { font: 700 14px Consolas, "Microsoft YaHei", monospace; fill: #1e293b; }
      .chip { fill: #0f766e; rx: 14; }
      .chipText { font: 800 13px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #334155; stroke-width: 3; fill: none; }
      .thin { stroke: #94a3b8; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="2000" height="2600"/>

  <text class="title" x="70" y="70">ApexPowers 详细项目地图</text>
  <text class="subtitle" x="70" y="108">这张图不是只画主流程，而是把每类 skill、Markdown 文档、脚本和产物都放到它在工作流中的职责位置。</text>

  <rect class="panel flow" x="70" y="145" width="1860" height="250"/>
  <text class="section" x="100" y="188">主流程：从私有模板包到目标项目 guardrail</text>
  <g>
    <rect x="100" y="220" width="300" height="118" rx="16" fill="#dbeafe" stroke="#3b82f6"/>
    <text class="h3" x="122" y="252">1. ApexPowers 源仓库</text>
    <text class="body" x="122" y="282">README、skills、.agents、脚本、测试</text>
    <text class="small" x="122" y="309">定位：私有分发模板，不是业务 app</text>
  </g>
  <g>
    <rect x="455" y="220" width="285" height="118" rx="16" fill="#dcfce7" stroke="#22c55e"/>
    <text class="h3" x="477" y="252">2. 安装到目标面</text>
    <text class="body" x="477" y="282">项目内或本机全局复制 skills</text>
    <text class="small" x="477" y="309">产出：.codex/skills、.claude/skills、.agents</text>
  </g>
  <g>
    <rect x="795" y="220" width="330" height="118" rx="16" fill="#ffedd5" stroke="#f97316"/>
    <text class="h3" x="817" y="252">3. 初始化 / 同步</text>
    <text class="body" x="817" y="282">生成根规则、注释目标、目录目标、agent 镜像</text>
    <text class="small" x="817" y="309">原则：脚本列目标，agent 读源码写内容</text>
  </g>
  <g>
    <rect x="1180" y="220" width="300" height="118" rx="16" fill="#fce7f3" stroke="#ec4899"/>
    <text class="h3" x="1202" y="252">4. 安装 Hook Runtime</text>
    <text class="body" x="1202" y="282">host JSON、runtime、manifest、loop 状态</text>
    <text class="small" x="1202" y="309">默认写 agent root，项目只留状态</text>
  </g>
  <g>
    <rect x="1535" y="220" width="355" height="118" rx="16" fill="#ede9fe" stroke="#8b5cf6"/>
    <text class="h3" x="1557" y="252">5. 使用时效果</text>
    <text class="body" x="1557" y="282">上下文注入、路线提示、安全/质量/验证门禁</text>
    <text class="small" x="1557" y="309">最终不替代项目 lint / test / CI</text>
  </g>
  <path class="line" d="M400 279 L455 279 M740 279 L795 279 M1125 279 L1180 279 M1480 279 L1535 279"/>

  <rect class="panel apex" x="70" y="435" width="900" height="700"/>
  <text class="section" x="100" y="478">Apex 自有 Skills：项目初始化、需求、PRD、Issue、Hook</text>
  <text class="body" x="100" y="512">
    <tspan class="mono">apex-session-init-codex</tspan><tspan>：Codex 开工前读 AGENTS.md / CLAUDE.md，确认当前项目规则。</tspan>
  </text>
  <text class="body" x="100" y="548">
    <tspan class="mono">apex-session-init-claude-code</tspan><tspan>：Claude Code 开工前读 CLAUDE.md / AGENTS.md。</tspan>
  </text>
  <text class="body" x="100" y="584">
    <tspan class="mono">apex-init-project-agent</tspan><tspan>：写固定根 AGENTS / CLAUDE，列出 .claude/rules 目标。</tspan>
  </text>
  <text class="small" x="126" y="612">rules 正文不是脚本套模板，要由 agent 阅读源码、配置、README 和目录后生成。</text>
  <text class="body" x="100" y="648">
    <tspan class="mono">apex-init-project-code</tspan><tspan>：扫描缺源码头注释的文件，由 agent 写标准 @tag 头。</tspan>
  </text>
  <text class="body" x="100" y="684">
    <tspan class="mono">apex-init-project-file</tspan><tspan>：扫描缺目录 Agents.md 的文件夹，由 agent 写极简目录职责说明。</tspan>
  </text>
  <text class="body" x="100" y="720">
    <tspan class="mono">apex-sync-agent-mirrors</tspan><tspan>：从 .agents 源模板生成 Codex TOML 与 Claude Markdown 镜像。</tspan>
  </text>
  <text class="body" x="100" y="756">
    <tspan class="mono">apex-init-project-hooks</tspan><tspan>：安装 / 更新 / 卸载 loop hooks，合并 host JSON 并保护用户 hook。</tspan>
  </text>
  <text class="body" x="100" y="792">
    <tspan class="mono">apex-grill-with-docs</tspan><tspan>：需求烤问，先问用户最多可回答几个问题，再维护 CONTEXT / ADR。</tspan>
  </text>
  <text class="body" x="100" y="828">
    <tspan class="mono">apex-to-prd</tspan><tspan>：把烤清楚的上下文整理成正式 PRD 并发布到 issue tracker。</tspan>
  </text>
  <text class="body" x="100" y="864">
    <tspan class="mono">apex-to-issues</tspan><tspan>：把 PRD / spec 拆成 vertical-slice issues，保证可独立实现和验证。</tspan>
  </text>
  <text class="h3" x="100" y="920">Apex 附属 Markdown</text>
  <text class="body" x="100" y="952">
    <tspan class="mono">CONTEXT-FORMAT.md</tspan><tspan>：领域术语、事实、约束和开放问题的上下文模板。</tspan>
  </text>
  <text class="body" x="100" y="984">
    <tspan class="mono">ADR-FORMAT.md</tspan><tspan>：记录架构决策、取舍、影响和后续行动的模板。</tspan>
  </text>
  <text class="body" x="100" y="1016">
    <tspan class="mono">agents/openai.yaml</tspan><tspan>：各 Apex skill 的 agent 元配置，随 skill 分发保留。</tspan>
  </text>
  <rect class="chip" x="100" y="1058" width="520" height="34"/>
  <text class="chipText" x="120" y="1081">关键设计：prompt-first，脚本只发现目标或写固定骨架</text>

  <rect class="panel docs" x="1030" y="435" width="900" height="700"/>
  <text class="section" x="1060" y="478">Markdown / Agent 文档：给人和 agent 读的上下文层</text>
  <text class="body" x="1060" y="512"><tspan class="mono">README.md</tspan><tspan>：安装、复制、手动脚本、hook、隐私和维护命令总入口。</tspan></text>
  <text class="body" x="1060" y="548"><tspan class="mono">.agents/Agents.md</tspan><tspan>：说明 .agents 是源模板，不是官方自动加载路径。</tspan></text>
  <text class="h3" x="1060" y="598">.agents/*.md 源模板</text>
  <text class="body" x="1060" y="630"><tspan class="mono">planner</tspan><tspan>：规划复杂任务，输出 tasks/todo+任务名.md。</tspan></text>
  <text class="body" x="1060" y="662"><tspan class="mono">implementer</tspan><tspan>：按批准计划执行，不重规划、不审查。</tspan></text>
  <text class="body" x="1060" y="694"><tspan class="mono">developer</tspan><tspan>：处理中小规模明确实现、bug 修复和 reviewer 反馈。</tspan></text>
  <text class="body" x="1060" y="726"><tspan class="mono">code-reviewer</tspan><tspan>：只审查并报告问题，不修改代码。</tspan></text>
  <text class="body" x="1060" y="758"><tspan class="mono">perf-optimizer</tspan><tspan>：性能分析，聚焦 React、WebGL/Canvas、大数据和卡顿。</tspan></text>
  <text class="body" x="1060" y="790"><tspan class="mono">researcher</tspan><tspan>：代码、文档、库和外部资料调研，只输出结论。</tspan></text>
  <text class="h3" x="1060" y="846">镜像文档</text>
  <text class="body" x="1060" y="878"><tspan class="mono">.codex/agents/*.toml</tspan><tspan>：Codex custom agent 运行面，含 developer_instructions。</tspan></text>
  <text class="body" x="1060" y="910"><tspan class="mono">.claude/agents/*.md</tspan><tspan>：Claude Code subagent 运行面，含 YAML frontmatter。</tspan></text>
  <text class="h3" x="1060" y="966">tasks/*.md 状态文档</text>
  <text class="body" x="1060" y="998"><tspan class="mono">todo+apex-loop-hooks.md</tspan><tspan>：当前 hook 改造计划、阶段、DoD。</tspan></text>
  <text class="body" x="1060" y="1030"><tspan class="mono">reviews/apex-loop-hooks.md</tspan><tspan>：Stop gate 要求的 review / validation 证据。</tspan></text>
  <text class="body" x="1060" y="1062"><tspan class="mono">research+trellis-*.md</tspan><tspan>：Trellis 对照研究和可借鉴模块。</tspan></text>
  <text class="body" x="1060" y="1094"><tspan class="mono">lessons.md</tspan><tspan>：Recent lessons 的注入来源。</tspan></text>

  <rect class="panel runtime" x="70" y="1175" width="900" height="580"/>
  <text class="section" x="100" y="1218">Hook 脚本与运行时：把规则变成即时 guardrail</text>
  <text class="body" x="100" y="1254"><tspan class="mono">init_project_hooks.py</tspan><tspan>：规划安装、合并 JSON、写 manifest、迁移 legacy、卸载 Apex 管理文件。</tspan></text>
  <text class="body" x="100" y="1290"><tspan class="mono">apex_loop.py</tspan><tspan>：hook 命令入口。</tspan></text>
  <text class="body" x="100" y="1326"><tspan class="mono">apex_loop_core.py</tspan><tspan>：兼容导出 RouteRegistry、HostConfigRenderer 和 main。</tspan></text>
  <text class="body" x="100" y="1362"><tspan class="mono">apex_loop_routes.py</tspan><tspan>：唯一 route registry，渲染 Codex / Claude hook JSON。</tspan></text>
  <text class="body" x="100" y="1398"><tspan class="mono">apex_loop_runtime.py</tspan><tspan>：实现 SecurityGuard、LineLengthGuard、SecretContentGuard、MirrorDriftGuard、ReviewGate。</tspan></text>
  <text class="body" x="100" y="1434"><tspan class="mono">apex_loop_utils.py</tspan><tspan>：解析 hook stdin、repo root、git diff、workflow 状态、review 文件和失败日志。</tspan></text>
  <text class="h3" x="100" y="1490">运行事件</text>
  <text class="body" x="100" y="1522"><tspan class="mono">SessionStart</tspan><tspan>：注入 branch、changed files、workflow state、todo、reviews、lessons。</tspan></text>
  <text class="body" x="100" y="1554"><tspan class="mono">UserPromptSubmit</tspan><tspan>：输出 workflow-state 和路线提示，只提醒不阻塞。</tspan></text>
  <text class="body" x="100" y="1586"><tspan class="mono">PreToolUse</tspan><tspan>：阻塞危险命令、force push、远程脚本管道和 secrets 路径。</tspan></text>
  <text class="body" x="100" y="1618"><tspan class="mono">PostToolUse</tspan><tspan>：检查 secret 内容、有效代码行数、.agents 镜像漂移。</tspan></text>
  <text class="body" x="100" y="1650"><tspan class="mono">Stop</tspan><tspan>：阻塞未同步镜像、未 review、Ready 后缺验证或 diff 已变更。</tspan></text>
  <text class="h3" x="100" y="1706">安装产物</text>
  <text class="small" x="100" y="1734">&lt;codex-home&gt;/hooks.json + hooks/apex_loop*.py；&lt;claude-home&gt;/settings.json + hooks/apex_loop*.py。</text>
  <text class="small" x="100" y="1758">项目侧保留 tasks/loops/workflow.md、tasks/reviews、tasks/lessons.md 和 manifest。</text>

  <rect class="panel vendored" x="1030" y="1175" width="900" height="580"/>
  <text class="section" x="1060" y="1218">Vendored Skills：随 ApexPowers 分发的公共能力包</text>
  <text class="body" x="1060" y="1254"><tspan class="mono">frontend-design</tspan><tspan>：生产级 Web UI 设计与实现。</tspan></text>
  <text class="body" x="1060" y="1286"><tspan class="mono">webapp-testing</tspan><tspan>：Playwright 浏览器验证、截图、console、元素定位。</tspan></text>
  <text class="body" x="1060" y="1318"><tspan class="mono">web-design-guidelines</tspan><tspan>：UI / UX / accessibility 审查。</tspan></text>
  <text class="body" x="1060" y="1350"><tspan class="mono">next-best-practices</tspan><tspan>：App Router、RSC、路由、数据、资源和部署实践。</tspan></text>
  <text class="body" x="1060" y="1382"><tspan class="mono">react-best-practices</tspan><tspan>：Vercel React / Next 性能规则集合。</tspan></text>
  <text class="body" x="1060" y="1414"><tspan class="mono">github-solution-research</tspan><tspan>：从 GitHub 仓库、issues、PR、讨论中找可复用解法。</tspan></text>
  <text class="h3" x="1060" y="1470">GSAP skills</text>
  <text class="body" x="1060" y="1502"><tspan class="mono">gsap-core</tspan><tspan>：基础 tween、easing、stagger、matchMedia。</tspan></text>
  <text class="body" x="1060" y="1534"><tspan class="mono">gsap-scrolltrigger</tspan><tspan>：滚动触发、pin、scrub、parallax。</tspan></text>
  <text class="body" x="1060" y="1566"><tspan class="mono">gsap-performance</tspan><tspan>：动画性能，transform/opacity、批处理、避免 layout thrash。</tspan></text>
  <text class="body" x="1060" y="1598"><tspan class="mono">gsap-timeline</tspan><tspan>：timeline、position 参数、嵌套和播放控制。</tspan></text>
  <text class="body" x="1060" y="1630"><tspan class="mono">gsap-plugins</tspan><tspan>：Flip、Draggable、SplitText、SVG、physics 等插件。</tspan></text>
  <text class="body" x="1060" y="1662"><tspan class="mono">gsap-utils</tspan><tspan>：clamp、mapRange、random、snap、toArray、wrap。</tspan></text>
  <text class="body" x="1060" y="1694"><tspan class="mono">gsap-react</tspan><tspan>：React / Next 中 useGSAP、refs、context、cleanup。</tspan></text>
  <text class="body" x="1060" y="1726"><tspan class="mono">gsap-frameworks</tspan><tspan>：Vue、Nuxt、Svelte、SvelteKit 生命周期和清理。</tspan></text>

  <rect class="panel docs" x="70" y="1795" width="900" height="610"/>
  <text class="section" x="100" y="1838">Vendored Markdown 文档：Next / React / Research / Testing</text>
  <text class="h3" x="100" y="1882">Next.js best practices docs</text>
  <text class="small" x="100" y="1912">async-patterns、bundling、data-patterns、debug-tricks、directives、error-handling、file-conventions、font、functions、hydration-error。</text>
  <text class="small" x="100" y="1938">image、metadata、parallel-routes、route-handlers、rsc-boundaries、runtime-selection、scripts、self-hosting、suspense-boundaries。</text>
  <text class="h3" x="100" y="1996">React best practices rules</text>
  <text class="body" x="100" y="2028"><tspan class="mono">advanced-*</tspan><tspan>：高阶 hooks、effect event、稳定 callback、一次性初始化。</tspan></text>
  <text class="body" x="100" y="2060"><tspan class="mono">async-*</tspan><tspan>：并发、waterfall、防止过早 await、Suspense 边界。</tspan></text>
  <text class="body" x="100" y="2092"><tspan class="mono">bundle-*</tspan><tspan>：barrel import、动态导入、第三方延迟、intent preload。</tspan></text>
  <text class="body" x="100" y="2124"><tspan class="mono">client-*</tspan><tspan>：事件监听、localStorage schema、passive scroll、SWR 去重。</tspan></text>
  <text class="body" x="100" y="2156"><tspan class="mono">js-*</tspan><tspan>：DOM 读写批处理、缓存、Set/Map、flatMap、idle callback。</tspan></text>
  <text class="body" x="100" y="2188"><tspan class="mono">rendering-*</tspan><tspan>：hydration、SVG、content-visibility、resource hints、transition。</tspan></text>
  <text class="body" x="100" y="2220"><tspan class="mono">rerender-*</tspan><tspan>：memo、derived state、依赖收窄、transitions、ref transient state。</tspan></text>
  <text class="body" x="100" y="2252"><tspan class="mono">server-*</tspan><tspan>：React.cache、LRU、Server Actions 鉴权、RSC 序列化和并行 fetch。</tspan></text>
  <text class="h3" x="100" y="2310">Research / Testing docs</text>
  <text class="small" x="100" y="2340">github-solution-research README、extraction-playbook、research-rubric。</text>
  <text class="small" x="100" y="2366">webapp-testing examples 和 with_server.py 用于本地浏览器验证。</text>

  <rect class="panel test" x="1030" y="1795" width="900" height="610"/>
  <text class="section" x="1060" y="1838">验证与质量门：哪些行为被测试锁定</text>
  <text class="body" x="1060" y="1880"><tspan class="mono">tests/test_apex_loop_hooks.py</tspan><tspan> 覆盖 runtime 行为：</tspan></text>
  <text class="body" x="1088" y="1912">- render-config 输出稳定 hook routes。</text>
  <text class="body" x="1088" y="1944">- UserPromptSubmit 只 advisory，不阻塞。</text>
  <text class="body" x="1088" y="1976">- SessionStart 注入 workflow state。</text>
  <text class="body" x="1088" y="2008">- 危险命令、secret 路径、secret 内容 fail closed。</text>
  <text class="body" x="1088" y="2040">- 大文件硬阻塞、生成文件例外、镜像漂移检测。</text>
  <text class="body" x="1088" y="2072">- Stop gate 创建 review request，并要求 Ready + Validation Pass。</text>
  <text class="body" x="1060" y="2126"><tspan class="mono">tests/test_apex_loop_installer.py</tspan><tspan> 覆盖安装器行为：</tspan></text>
  <text class="body" x="1088" y="2158">- 默认 agent-scope，hook 文件写到 agent root。</text>
  <text class="body" x="1088" y="2190">- project-scope legacy 仍可用。</text>
  <text class="body" x="1088" y="2222">- 合并用户已有 host config，重复安装不重复追加。</text>
  <text class="body" x="1088" y="2254">- update / uninstall 走 manifest，保留用户 hook 和受保护状态。</text>
  <text class="body" x="1088" y="2286">- legacy 项目级 hooks 自动迁移清理。</text>
  <rect class="chip" x="1060" y="2338" width="660" height="34"/>
  <text class="chipText" x="1080" y="2361">验证命令：py_compile + unittest；hook 不替代项目自己的 lint/type-check/test/CI</text>

  <rect class="panel" x="70" y="2440" width="1860" height="130"/>
  <text class="section" x="100" y="2483">读图结论</text>
  <text class="body" x="100" y="2519">ApexPowers 的核心不是“一个执行程序”，而是一套可复制到下游项目的协作系统：skills 负责触发工作流，Markdown 负责沉淀上下文，脚本负责安全地发现/同步/安装，hook runtime 负责即时提醒和阻塞高风险完成路径。</text>
  <text class="body" x="100" y="2557">最关键边界：脚本不能替代 agent 读源码生成判断；hook 是 guardrail，不是 CI；`.agents` 是源模板，`.codex/agents` 和 `.claude/agents` 是生成镜像。</text>
</svg>
