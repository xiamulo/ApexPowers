description = "Orchestrate parallel delivery across worktrees, issues, and PRs"
prompt = "Use apex-orchestrate-delivery for a non-trivial feature, fix train, or PR-sized rollout. First read docs/apex-parallel-delivery-orchestration.md. Treat .agents/*.md as the role source of truth and .codex/agents/*.toml plus .claude/agents/*.md as generated mirrors; run or request apex-sync-agent-mirrors if mirrors are stale. Define the delivery level: worktree, issue, or PR. For PRD/spec/plan input, invoke apex-to-issues to split vertical-slice issues before assigning work. Build an orchestration ledger that lists each slice, dependency, owner role (planner, researcher, implementer, developer, code-reviewer, perf-optimizer), worktree or branch, expected files, validation commands, and review gate. Do not start parallel implementation when the current worktree has overlapping uncommitted changes; report the conflict. Require explicit review gate before done: code-reviewer verdict Ready, Validation: Pass, commands summarized, and no stale review after new code diff."
