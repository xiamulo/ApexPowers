interface:
  display_name: "GitHub Solution Research"
  short_description: "Use GitHub CLI first to find high-fit GitHub evidence and map reusable patterns to local adaptation."
  default_prompt: "Use $github-solution-research to frame my problem, search GitHub with gh first, conditionally use subagents only when they improve research coverage, list relevant project basics including Stars when a repository-level solution applies, record subagent trace if used, then recommend the smallest local adaptation and verification path."
